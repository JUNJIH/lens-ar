<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LENS 物体認識モード（COCO-SSD）</title>

  <!--
    ─────────────────────────────────────────────────────────
    LENS 物体認識モード（COCO-SSD）
    ─────────────────────────────────────────────────────────
    MindARとの違い：
      MindAR   … 登録した"画像"を特徴点で見分ける（柄が必要）
      COCO-SSD … 映像の中の"物体の種類"を見つける（登録不要）
                 80種類を認識。冷蔵庫(refrigerator)も含む。

    今回はARの3D空間を使わず、カメラ映像の上にHTMLで枠と情報を重ねる。
    「種類で認識する」という体験を、まず素直に確かめるのが目的。
    ─────────────────────────────────────────────────────────
  -->

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;
           overflow: hidden; background: #000; }

    #stage { position: fixed; inset: 0; }
    #cam { width: 100%; height: 100%; object-fit: cover; }
    /* 検出結果を描く透明キャンバス（映像に重ねる） */
    #overlay { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    #hint {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(13,15,18,.82); color: #f5f5f4;
      padding: 10px 16px; border-radius: 999px; font-size: 13px;
      border: 1px solid #3a3f47; text-align: center; max-width: 90%;
    }
    #status-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(13,15,18,0), rgba(13,15,18,0.85) 60%);
      color: #cbd5e1; font-size: 12px; letter-spacing: .08em;
    }
    #fps { color: #7dd3fc; }
  </style>
</head>
<body>

  <div id="hint">モデルを読み込んでいます…</div>

  <div id="stage">
    <video id="cam" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status-bar">LENS 物体認識　<span id="fps">--</span></div>

  <script src="detect-app.js"></script>
</body>
</html>
