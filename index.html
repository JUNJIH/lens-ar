<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LENS — 看板が、見る人によって変わる</title>

  <!--
    ─────────────────────────────────────────────────────────
    LENS 第二段階：擬似AR（マーカー型）
    ─────────────────────────────────────────────────────────
    やっていること：
      1. スマホのカメラをブラウザで起動する
      2. カメラが「マーカー」を見つけたら、その上に情報を重ねる
      3. 登録プロフィールを切り替えると、同じマーカーでも中身が変わる

    使うライブラリ：
      - A-Frame  … 3D/ARを簡単に書くためのHTML的な枠組み
      - AR.js    … カメラ映像からマーカーを認識する部分

    認識は今は「1種類のマーカーだけ」に絞ってごまかしている。
    画像認識の重い処理は後回し。まずは体験を実機で確かめるのが目的。
    ─────────────────────────────────────────────────────────
  -->

  <!-- A-Frame本体 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- AR.js（A-Frame版） -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif; overflow: hidden; }

    /* 画面下に固定するプロフィール切り替えUI（ARの上に重ねる普通のHTML） */
    #ui {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 10;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(13,15,18,0), rgba(13,15,18,0.92) 40%);
      color: #f5f5f4;
    }
    #ui .title { font-size: 11px; letter-spacing: .2em; color: #cbd5e1; margin-bottom: 8px; }
    #chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .chip {
      flex: 0 0 auto; padding: 9px 13px; border-radius: 999px;
      border: 1px solid #3a3f47; background: rgba(28,31,36,.8);
      color: #f5f5f4; font-size: 13px; font-weight: 700; white-space: nowrap;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .chip.active { background: #f5f5f4; color: #0d0f12; border-color: #f5f5f4; }

    /* マーカー未検出のときのガイド表示 */
    #hint {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(13,15,18,.82); color: #f5f5f4;
      padding: 10px 16px; border-radius: 999px; font-size: 13px;
      border: 1px solid #3a3f47; transition: opacity .3s;
    }
    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div id="hint">マーカーにカメラを向けてください</div>

  <!-- ▼ AR空間。embedded で普通のページの中に埋め込む -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
  >
    <!-- ▼ マーカー：まずは定番の "hiro" マーカーを使う（テストが一番ラク）-->
    <a-marker
      type="pattern"
      preset="hiro"
      id="marker"
      emitevents="true"
    >
      <!-- マーカーの上に浮かべる情報パネル。中身はJSから差し替える -->
      <a-entity id="panel" position="0 0 0" rotation="-90 0 0"></a-entity>
    </a-marker>

    <!-- カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- ▼ プロフィール切り替えUI -->
  <div id="ui">
    <div class="title">誰として見る？</div>
    <div id="chips"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
