<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LENS — 看板が、見る人によって変わる</title>

  <!--
    ─────────────────────────────────────────────────────────
    LENS：画像認識 + 複数ターゲット + 触れるパネル
    ─────────────────────────────────────────────────────────
    今回の追加：パネルをタップできるようにした。
      - 画面を触った位置からカメラ越しに光線を飛ばして板に当てる
      - 判定はJS側で自前に実装（後から生成した板も確実に拾うため）
      - 画面遷移：ホーム →「お店のおすすめ」/「あなたの興味」
    ─────────────────────────────────────────────────────────
  -->

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif; overflow: hidden; }

    #ui {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(13,15,18,0), rgba(13,15,18,0.92) 40%);
      color: #f5f5f4;
    }
    #ui .title { font-size: 11px; letter-spacing: .18em; color: #cbd5e1; margin-bottom: 8px; }
    #chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .chip {
      flex: 0 0 auto; padding: 9px 13px; border-radius: 999px;
      border: 1px solid #3a3f47; background: rgba(28,31,36,.8);
      color: #f5f5f4; font-size: 13px; font-weight: 700; white-space: nowrap;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .chip.active { background: #f5f5f4; color: #0d0f12; border-color: #f5f5f4; }

    #hint {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(13,15,18,.82); color: #f5f5f4;
      padding: 10px 16px; border-radius: 999px; font-size: 13px;
      border: 1px solid #3a3f47; transition: opacity .3s; text-align: center;
    }
    #hint.hidden { opacity: 0; }

    /* ── 下部UIの行 ── */
    #ui .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    #status { color: #7dd3fc; }
    .mini {
      background: transparent; border: 1px solid #3a3f47; color: #f5f5f4;
      border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    /* ── 興味の登録画面 ── */
    #editor {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(6,7,9,.86);
      display: flex; align-items: flex-end; justify-content: center;
    }
    #editor.hidden { display: none; }
    .sheet {
      width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
      background: #101216; color: #f5f5f4;
      border-top-left-radius: 20px; border-top-right-radius: 20px;
      border: 1px solid #23262b; border-bottom: none;
      padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
    }
    .sheet h2 { font-size: 19px; margin-bottom: 6px; }
    .lead { font-size: 13px; color: #9ca3af; margin-bottom: 18px; line-height: 1.6; }
    .section-label {
      font-size: 11px; letter-spacing: .16em; color: #6b7280;
      margin: 16px 0 10px;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 10px 14px; border-radius: 999px;
      border: 1px solid #3a3f47; background: transparent;
      color: #f5f5f4; font-size: 14px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .tag.on { background: #f5f5f4; color: #0d0f12; border-color: #f5f5f4; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    .actions button {
      flex: 1; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: inherit;
    }
    .ghost { background: transparent; border: 1px solid #3a3f47; color: #f5f5f4; }
    .primary { background: #f5f5f4; border: 1px solid #f5f5f4; color: #0d0f12; }
  </style>
</head>
<body>

  <div id="hint">対象の画像にカメラを向けてください</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no; maxTrack: 2;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ▼ 認識対象 0番 -->
    <a-entity class="lens-target" data-index="0" mindar-image-target="targetIndex: 0">
      <a-entity class="lens-panel"></a-entity>
    </a-entity>

    <!-- ▼ 認識対象 1番 -->
    <a-entity class="lens-target" data-index="1" mindar-image-target="targetIndex: 1">
      <a-entity class="lens-panel"></a-entity>
    </a-entity>
  </a-scene>

  <div id="ui">
    <div class="row">
      <div class="title">誰として見る？　<span id="status">起動中</span></div>
      <button id="editBtn" class="mini">興味を編集</button>
    </div>
    <div id="chips"></div>
  </div>

  <!-- ▼ 興味の登録画面（ふだんは隠れている） -->
  <div id="editor" class="hidden">
    <div class="sheet">
      <h2>あなたの興味</h2>
      <p class="lead">当てはまるものを選んでください。看板に出る内容が変わります。</p>

      <div class="section-label">好み</div>
      <div id="tagList" class="tags"></div>

      <div class="section-label">1回に使ってもいい金額</div>
      <div id="budgetList" class="tags"></div>

      <div class="actions">
        <button id="cancelBtn" class="ghost">キャンセル</button>
        <button id="saveBtn" class="primary">保存する</button>
      </div>
    </div>
  </div>

  <script src="mindar-app.js"></script>
</body>
</html>
