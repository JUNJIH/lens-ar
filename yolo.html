<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LENS YOLO — YOLOv8で物体検出</title>

  <!--
    ─────────────────────────────────────────────────────────
    LENS YOLO（YOLOv8 / onnxruntime-web）
    ─────────────────────────────────────────────────────────
    COCO-SSDとの比較用。認識できる種類は同じ80種類だが、
    モデルの精度・速度が異なる。体感で比べるのが目的。

    COCO-SSDとの実装上の違い：
      COCO-SSD … model.detect(video) で完成した結果が返る（親切）
      YOLOv8   … 生の数値[1,84,8400]が返る。後処理を自分で書く
                 ・入力を640x640に整える（レターボックス）
                 ・出力から座標とクラスを取り出す
                 ・重複した枠を除去する（NMS）

    モデルはCDN上の公開ONNXを読み込む。
    ─────────────────────────────────────────────────────────
  -->

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;
      overflow: hidden; background: #000; color: #f5f5f4;
    }
    #stage { position: fixed; inset: 0; }
    #cam { width: 100%; height: 100%; object-fit: cover; }
    #overlay { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      background: linear-gradient(180deg, rgba(13,15,18,0.9), rgba(13,15,18,0));
      display: flex; align-items: center; gap: 12px;
    }
    #title { font-size: 14px; font-weight: 800; letter-spacing: .1em; color: #e0a020; }
    #fps { margin-left: auto; font-size: 13px; font-weight: 700; color: #7dd3fc; }

    #bottombar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(13,15,18,0), rgba(13,15,18,0.92) 40%);
      font-size: 13px; color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div id="stage">
    <video id="cam" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="topbar">
    <span id="title">YOLOv8</span>
    <span id="fps">--</span>
  </div>

  <div id="bottombar">準備中…</div>

  <script src="yolo-app.js"></script>
</body>
</html>
